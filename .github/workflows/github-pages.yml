# Publishes the Vite production build (dist/) to GitHub Pages.
#
# Settings (https://github.com/nasirchaingpt/Deploy_Contracts/settings/pages):
#   Build and deployment → Source → GitHub Actions
#   (Do NOT use "Deploy from a branch" with Branch: main / Folder: / — that
#   publishes repo-root index.html and the browser loads /src/main.tsx from
#   the site root → 404.)
#
# Live URL: https://nasirchaingpt.github.io/Deploy_Contracts/

name: GitHub Pages

on:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - run: npm ci
      - run: npm run build
      - run: node scripts/verify-dist-for-pages.mjs
      - name: SPA fallback for client-side routes
        run: cp dist/index.html dist/404.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
